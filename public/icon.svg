<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Gradients -->
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    
    <linearGradient id="secondary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Intense Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <g transform="translate(256, 256)">
    <!-- Hexagon Grid Lines -->
    <g stroke="rgba(255, 255, 255, 0.05)" stroke-width="2">
      <polygon points="0,-160 138,-80 138,80 0,160 -138,80 -138,-80" fill="none"/>
      <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" fill="none"/>
      <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="none"/>
      
      <line x1="0" y1="-160" x2="0" y2="160"/>
      <line x1="-138" y1="-80" x2="138" y2="80"/>
      <line x1="-138" y1="80" x2="138" y2="-80"/>
    </g>

    <!-- Outer Tech Ring -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="rgba(255, 255, 255, 0.04)" stroke-width="4" stroke-dasharray="10 14"/>
    <circle cx="0" cy="0" r="190" fill="none" stroke="rgba(6, 182, 212, 0.1)" stroke-width="1"/>

    <!-- Glowing Hexagon Base -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" 
             fill="none" 
             stroke="url(#secondary)" 
             stroke-width="6"
             stroke-linejoin="round"
             filter="url(#glow)"
             opacity="0.5"/>

    <!-- Dynamic Lightning Bolt (RPC Fast) -->
    <path d="M 20 -100 
             L -60 20 
             L 10 20 
             L -30 120 
             L 70 -10 
             L 0 -10 Z" 
          fill="url(#primary)"
          filter="url(#glow)"/>
          
    <!-- Core Brightness for Bolt -->
    <path d="M 20 -100 
             L -60 20 
             L 10 20 
             L -30 120 
             L 70 -10 
             L 0 -10 Z" 
          fill="#E0F2FE"
          opacity="0.9"/>
          
    <!-- Inner Highlighting -->
    <path d="M 12 -80 L -40 10 L -5 10 L -20 70 L 40 0 L 5 0 Z" 
          fill="#FFFFFF"
          opacity="0.6"/>
  </g>
</svg>